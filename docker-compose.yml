

# Only the stateful data services run in Docker. The gateway, agents, ETL
# workers, and frontend are run natively on the host (see README.md) -- their
# config defaults already point at localhost so no .env file is required for
# local dev against these containers.

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supply_chain}
      POSTGRES_USER: ${POSTGRES_USER:-supply_chain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./databases/postgis/init.sql:/docker-entrypoint-initdb.d/02_postgis.sql
      - ./databases/postgres/kpi.sql:/docker-entrypoint-initdb.d/03_kpi.sql

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-me}
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4j_data:/data
      - ./databases/neo4j:/init

volumes:
  redis_data:
  postgres_data:
  neo4j_data:
