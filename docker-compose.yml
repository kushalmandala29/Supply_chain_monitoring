version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS (Persistent Analytics Memory)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:15-3.4
    container_name: scri-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: risk_intelligence
      POSTGRES_USER: db_orchestrator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/sql/init_postgis.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_orchestrator -d risk_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j (Relational Topology Memory — local dev mirror of AuraDB)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: scri-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-localdev123}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-localdev123} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # DynamoDB Local (Ephemeral State Memory — local dev substitute)
  # ---------------------------------------------------------------------------
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: scri-dynamodb
    restart: unless-stopped
    ports:
      - "8100:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    volumes:
      - dynamodb_data:/home/dynamodblocal/data

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  dynamodb_data:
    driver: local
